name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint with ruff
        run: ruff check bot.py unified_bridge.py tests/

      - name: Run tests with coverage
        # 60% floor reflects that ~half of unified_bridge.py is async
        # Discord-interaction code (event loops, slash command callbacks,
        # subprocess streaming) where heavy mocking provides little
        # safety value. bot.py itself sits comfortably above 90%.
        run: pytest --cov=bot --cov=unified_bridge --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage artifact
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
